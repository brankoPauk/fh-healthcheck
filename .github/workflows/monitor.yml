name: FormationHub Monitor

# Runs the synthetic checkout health check every 15 minutes, in the cloud.
# Independent of any laptop. Posts to Slack (via secret) only when the check fails.
on:
  # PRIMARY trigger: an external cron service (e.g. cron-job.org) calls the GitHub
  # "dispatches" API every 15 min with event_type "run-check". GitHub's own `schedule`
  # cron is throttled/dropped heavily on low-traffic repos, so we don't rely on it.
  repository_dispatch:
    types: [run-check]
  # FALLBACK trigger: GitHub's built-in cron. Best-effort only — keep it as a safety net
  # in case the external service is down. Real cadence comes from repository_dispatch.
  schedule:
    - cron: "*/15 * * * *"   # every 15 min (UTC). GitHub may delay/skip under load.
  workflow_dispatch:           # allows manual "Run workflow" from the Actions tab
    inputs:
      force_fail:
        description: "Force a failure to test the Slack alert"
        type: boolean
        default: false

# Avoid overlapping runs if one is slow.
concurrency:
  group: formationhub-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium (with OS deps)
        run: npx playwright install --with-deps chromium

      - name: Run health check
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          FORCE_FAIL: ${{ inputs.force_fail }}
        run: node monitor.js

      - name: Upload failure screenshot (only on failure)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshots
          path: screenshots/
          if-no-files-found: ignore
          retention-days: 7
